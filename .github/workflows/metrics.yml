name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: patel-mark
          template: classic
          base: header, activity, community, repositories
          config_timezone: Africa/Nairobi
          config_theme: dark
          
          # 📊 Most Used Languages (Creates a horizontal stacked bar + detailed list)
          plugin_languages: yes
          plugin_languages_details: percentage, lines
          plugin_languages_limit: 8
          
          # 📈 Coding Habits Bar Charts (Visual bar graphs of what days/times you code)
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 30
          plugin_habits_facts: no
          plugin_habits_charts: yes
          
          # 📆 3D Isometric Contributions Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # 🚀 Lines of Code Timeline Graph (Visual chart of code additions/deletions)
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
